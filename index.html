<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="bg"></div>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <!-- USER -->
    <div class="card glass">
        <input id="username" placeholder="Enter user name">
        <button onclick="setUser()">Set User</button>
    </div>

    <!-- SEARCH -->
    <div class="card glass">
        <input id="search" placeholder="Search name (e.g. Nandita)" oninput="renderExpenses()">
    </div>

    <!-- ADD -->
    <div class="card glass">
        <input id="desc" placeholder="Expense (e.g. Nandita Dress)">
        <input id="amount" type="number" placeholder="Amount">

        <select id="category">
            <option>Food</option>
            <option>Travel</option>
            <option>Study</option>
            <option>Other</option>
        </select>

        <button onclick="addExpense()">Add Expense</button>
    </div>

    <h2>Total: ₹<span id="total">0</span></h2>

    <!-- CHART -->
    <div class="card glass">
        <canvas id="chart"></canvas>
    </div>

    <ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
