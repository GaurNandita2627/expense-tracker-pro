<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker Pro</title>

<link rel="stylesheet" href="style.css">

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- OCR -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>

<div class="container">

    <h1>💰 Expense Tracker Pro</h1>

    <!-- USER -->
    <div class="card">
        <input id="username" placeholder="Enter user name">
        <button onclick="setUser()">Set User</button>
        <p id="activeUser">No user selected</p>
    </div>

    <!-- SEARCH -->
    <div class="card">
        <input id="search" placeholder="Search name (e.g. Nandita)" oninput="renderExpenses()">
    </div>

    <!-- ADD -->
    <div class="card">
        <input id="desc" placeholder="Expense name (e.g. Nandita Dress)">
        <input id="amount" type="number" placeholder="Amount">

        <select id="category">
            <option>Food</option>
            <option>Travel</option>
            <option>Study</option>
            <option>Other</option>
        </select>

        <button onclick="addExpense()">Add Expense</button>
    </div>

    <!-- OCR -->
    <div class="card">
        <h3>📸 OCR Scan</h3>
        <input type="file" id="imageInput">
        <button onclick="scanImage()">Scan Image</button>
    </div>

    <h2>Total: ₹<span id="total">0</span></h2>

    <div class="card">
    <h3>📊 OCR Last Scan Total</h3>
    <p id="ocrTotal">₹0</p>
    </div>

    <!-- CHART -->
    <div class="card">
        <canvas id="chart"></canvas>
    </div>

    <!-- HISTORY -->
    <ul id="list"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
